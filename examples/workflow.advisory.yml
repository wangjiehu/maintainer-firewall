name: Maintainer Firewall Advisory

on:
  issues:
    types: [opened, edited, reopened, labeled, unlabeled]
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: maintainer-firewall-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  firewall:
    runs-on: ubuntu-latest
    steps:
      # Copy examples/config.quiet.yml to .maintainer-firewall.yml for comment-only rollout.
      - uses: wangjiehu/maintainer-firewall@v0.5.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
