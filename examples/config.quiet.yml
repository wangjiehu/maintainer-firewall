version: 1

labeling:
  enabled: false

comment:
  enabled: true
  postWhen: findings
  includePassingChecks: false

pullRequest:
  requireLinkedIssue: false
  requireTestsForCodeChanges: true
  largeChangeThreshold: 1200

ai:
  enabled: false

ignore:
  authors:
    - dependabot[bot]
    - renovate[bot]
    - github-actions[bot]
  labels:
    - skip-firewall
  titlePatterns:
    - "^\\[skip firewall\\]"
