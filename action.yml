name: Maintainer Firewall
description: Filter noisy issues and pull requests by evidence, reproducibility, scope, and project-specific contribution rules.
author: maintainer-firewall
inputs:
  github-token:
    description: GitHub token used to read repository context and, when not in dry-run mode, write labels/comments.
    required: true
  openai-api-key:
    description: Optional OpenAI API key. Required only when ai.enabled is true; otherwise deterministic rules still run.
    required: false
  config-path:
    description: Path to the Maintainer Firewall YAML config in the repository.
    required: false
    default: .maintainer-firewall.yml
  dry-run:
    description: When true, produces reports and outputs without writing labels, comments, or stale-label removals.
    required: false
    default: "false"
  fail-on-findings:
    description: When true, fails the workflow if warning or error findings are produced. Defaults to advisory mode.
    required: false
    default: "false"
  emit-annotations:
    description: When true, emits each finding as a GitHub Actions notice, warning, or error annotation.
    required: false
    default: "false"
  write-step-summary:
    description: When true, writes the report to the GitHub Actions step summary for easy inspection.
    required: false
    default: "true"
  report-json-path:
    description: Optional workspace-relative path where a structured JSON report should be written for downstream steps.
    required: false
outputs:
  outcome:
    description: Review-readiness outcome such as ready, needs_info, needs_tests, needs_maintainer_review, blocked, or skipped.
  score:
    description: Review-readiness score from 0 to 100.
  findings-count:
    description: Number of findings produced by enabled checks.
  labels:
    description: Comma-separated labels suggested or applied by the action.
  routing-hints:
    description: JSON routing hints derived from CODEOWNERS, when available.
  skipped:
    description: Whether the subject was skipped by ignore rules.
  skip-reason:
    description: Reason the subject was skipped, when applicable.
  report-json-path:
    description: Path to the structured JSON report when report-json-path is configured.
  config-warnings-count:
    description: Number of configuration diagnostics emitted while loading and validating Maintainer Firewall config.
  config-warnings:
    description: JSON array of configuration diagnostics emitted while loading and validating Maintainer Firewall config.
runs:
  using: node20
  main: dist/index.js
branding:
  icon: shield
  color: gray-dark
