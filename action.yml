name: Maintainer Firewall
description: Filter noisy issues and pull requests by evidence, reproducibility, scope, and project-specific contribution rules.
author: maintainer-firewall
inputs:
  github-token:
    description: GitHub token used to read the repository and write labels/comments.
    required: true
  openai-api-key:
    description: Optional OpenAI API key. When omitted, only deterministic rules run.
    required: false
  config-path:
    description: Path to the Maintainer Firewall YAML config.
    required: false
    default: .maintainer-firewall.yml
  dry-run:
    description: When true, prints the report without writing labels or comments.
    required: false
    default: "false"
  fail-on-findings:
    description: When true, fails the workflow if warning or error findings are produced.
    required: false
    default: "false"
  write-step-summary:
    description: When true, writes the report to the GitHub Actions step summary.
    required: false
    default: "true"
  report-json-path:
    description: Optional path where a structured JSON report should be written.
    required: false
outputs:
  outcome:
    description: Review-readiness outcome, such as ready, needs_info, or needs_tests.
  score:
    description: Review-readiness score from 0 to 100.
  findings-count:
    description: Number of findings produced by enabled checks.
  labels:
    description: Comma-separated labels suggested or applied by the action.
  routing-hints:
    description: JSON routing hints derived from CODEOWNERS, when available.
  skipped:
    description: Whether the subject was skipped by ignore rules.
  skip-reason:
    description: Reason the subject was skipped, when applicable.
  report-json-path:
    description: Path to the structured JSON report when report-json-path is configured.
runs:
  using: node20
  main: dist/index.js
branding:
  icon: shield
  color: gray-dark
